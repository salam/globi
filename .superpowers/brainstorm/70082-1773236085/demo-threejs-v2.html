<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Globe Demo — Three.js</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e1a; color: #e0e6f0; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  h1 { font-size: 18px; margin-bottom: 4px; color: #44bbff; }
  .subtitle { font-size: 13px; color: #8899bb; margin-bottom: 16px; }
  #container { width: 600px; height: 600px; border: 1px solid #1d2a44; border-radius: 12px; overflow: hidden; }
  #stats { margin-top: 12px; font-size: 13px; color: #99aacc; font-family: monospace; white-space: pre-line; min-height: 60px; }
</style>
</head>
<body>
<h1>Three.js Globe (Day + Night + Atmosphere)</h1>
<p class="subtitle">GPU-accelerated with custom GLSL shaders. Open DevTools → Memory → Heap Snapshot.</p>
<div id="container"></div>
<div id="stats">Loading Three.js + textures...</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const container = document.getElementById('container');
const W = 600, H = 600;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(W, H);
renderer.setPixelRatio(window.devicePixelRatio || 1);
renderer.setClearColor(0x0a0e1a, 1);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 0, 3);

const ambient = new THREE.AmbientLight(0x222244, 0.4);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 1.6);
sun.position.set(-5, 3, 8);
scene.add(sun);

const loader = new THREE.TextureLoader();
let loadCount = 0, dayTex, nightTex, earth;

function onLoad() {
  loadCount++;
  document.getElementById('stats').textContent = `Loaded ${loadCount}/2 textures...`;
  if (loadCount >= 2) buildEarth();
}

dayTex = loader.load('day_2k.jpg', onLoad);
dayTex.colorSpace = THREE.SRGBColorSpace;
nightTex = loader.load('night_2k.jpg', onLoad);
nightTex.colorSpace = THREE.SRGBColorSpace;

function buildEarth() {
  const geo = new THREE.SphereGeometry(1, 64, 64);
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      dayTexture: { value: dayTex },
      nightTexture: { value: nightTex },
      sunDirection: { value: new THREE.Vector3(-0.42, 0.32, 0.85).normalize() },
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D dayTexture;
      uniform sampler2D nightTexture;
      uniform vec3 sunDirection;
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vec3 n = normalize(vNormal);
        float NdotL = dot(n, sunDirection);
        float dayFactor = smoothstep(-0.15, 0.25, NdotL);
        vec4 day = texture2D(dayTexture, vUv);
        vec4 night = texture2D(nightTexture, vUv);
        vec3 color = mix(night.rgb * 1.4, day.rgb, dayFactor);
        vec3 viewDir = normalize(-vPosition);
        float fresnel = pow(1.0 - max(dot(viewDir, n), 0.0), 3.0);
        color += vec3(0.25, 0.45, 0.8) * fresnel * 0.35;
        color += vec3(0.02, 0.03, 0.06) * (1.0 - dayFactor);
        gl_FragColor = vec4(color, 1.0);
      }
    `,
  });

  earth = new THREE.Mesh(geo, mat);
  scene.add(earth);

  // Atmosphere
  const atmosGeo = new THREE.SphereGeometry(1.06, 64, 64);
  const atmosMat = new THREE.ShaderMaterial({
    uniforms: {
      sunDirection: { value: new THREE.Vector3(-0.42, 0.32, 0.85).normalize() },
    },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 sunDirection;
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vec3 n = normalize(vNormal);
        vec3 v = normalize(-vPosition);
        float fresnel = pow(1.0 - max(dot(v, n), 0.0), 2.5);
        float sunFacing = max(0.0, dot(n, sunDirection));
        float intensity = fresnel * (0.5 + 0.5 * sunFacing);
        vec3 c = mix(vec3(0.15, 0.3, 0.7), vec3(0.4, 0.7, 1.0), sunFacing);
        gl_FragColor = vec4(c, intensity * 0.65);
      }
    `,
    transparent: true,
    side: THREE.BackSide,
    depthWrite: false,
  });
  scene.add(new THREE.Mesh(atmosGeo, atmosMat));

  requestAnimationFrame(loop);
}

let frameCount = 0, fpsAccum = 0, lastFps = performance.now();

function loop(now) {
  const t0 = performance.now();
  if (earth) earth.rotation.y += 0.002;
  renderer.render(scene, camera);
  const ft = performance.now() - t0;
  frameCount++; fpsAccum += ft;

  if (now - lastFps > 1000) {
    const fps = (frameCount / ((now - lastFps) / 1000)).toFixed(1);
    const avg = (fpsAccum / frameCount).toFixed(1);
    const info = renderer.info;
    document.getElementById('stats').textContent =
      `FPS: ${fps}  |  Frame: ${avg} ms\nTextures: ${info.memory.textures}  |  Geometries: ${info.memory.geometries}\nDraw calls: ${info.render.calls}  |  Triangles: ${info.render.triangles}\nPixel ratio: ${renderer.getPixelRatio()}`;
    frameCount = 0; fpsAccum = 0; lastFps = now;
  }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
