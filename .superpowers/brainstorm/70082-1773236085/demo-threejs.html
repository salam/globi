<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Globe Demo — Three.js</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e1a; color: #e0e6f0; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  h1 { font-size: 18px; margin-bottom: 4px; color: #7eb8ff; }
  .subtitle { font-size: 13px; color: #8899bb; margin-bottom: 16px; }
  #container { width: 800px; height: 800px; border: 1px solid #1d2a44; border-radius: 12px; overflow: hidden; }
  #stats { margin-top: 12px; font-size: 13px; color: #99aacc; font-family: monospace; white-space: pre-line; }
</style>
</head>
<body>
<h1>Three.js Globe (Day + Night + Atmosphere)</h1>
<p class="subtitle">Open DevTools → Memory tab to inspect heap usage</p>
<div id="container"></div>
<div id="stats">Loading Three.js + textures...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const container = document.getElementById('container');
const W = 800, H = 800;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(W, H);
renderer.setPixelRatio(1);
renderer.setClearColor(0x0a0e1a, 1);
container.appendChild(renderer.domElement);

// Scene & Camera
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 0, 3);

// Lighting
const ambientLight = new THREE.AmbientLight(0x222244, 0.4);
scene.add(ambientLight);
const sunLight = new THREE.DirectionalLight(0xffffff, 1.6);
sunLight.position.set(-5, 3, 8);
scene.add(sunLight);

// Texture loader
const loader = new THREE.TextureLoader();

// Earth textures
const TEX_DAY = 'https://eoimages.gsfc.nasa.gov/images/imagerecords/57000/57730/land_ocean_ice_2048.png';
const TEX_NIGHT = 'https://eoimages.gsfc.nasa.gov/images/imagerecords/79000/79765/dnb_land_ocean_ice.2012.3600x1800.jpg';

let dayTex = null, nightTex = null;
let loadCount = 0;
const totalTextures = 2;

function onTexLoaded() {
  loadCount++;
  document.getElementById('stats').textContent = `Loaded ${loadCount}/${totalTextures} textures...`;
  if (loadCount >= totalTextures) {
    buildEarth();
    requestAnimationFrame(loop);
  }
}

dayTex = loader.load(TEX_DAY, onTexLoaded, undefined, () => {
  document.getElementById('stats').textContent += '\nFailed to load day texture';
});
dayTex.colorSpace = THREE.SRGBColorSpace;

nightTex = loader.load(TEX_NIGHT, onTexLoaded, undefined, () => {
  document.getElementById('stats').textContent += '\nFailed to load night texture';
});
nightTex.colorSpace = THREE.SRGBColorSpace;

let earth = null;
let atmosphere = null;

function buildEarth() {
  // Earth with day/night shader
  const earthGeo = new THREE.SphereGeometry(1, 64, 64);

  const earthMat = new THREE.ShaderMaterial({
    uniforms: {
      dayTexture: { value: dayTex },
      nightTexture: { value: nightTex },
      sunDirection: { value: new THREE.Vector3(-0.42, 0.32, 0.85).normalize() },
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D dayTexture;
      uniform sampler2D nightTexture;
      uniform vec3 sunDirection;
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vPosition;

      void main() {
        vec3 normal = normalize(vNormal);
        float NdotL = dot(normal, sunDirection);

        // Smooth day/night transition
        float dayFactor = smoothstep(-0.15, 0.25, NdotL);

        vec4 dayColor = texture2D(dayTexture, vUv);
        vec4 nightColor = texture2D(nightTexture, vUv);

        // Night lights are brighter in dark areas
        vec3 color = mix(nightColor.rgb * 1.4, dayColor.rgb, dayFactor);

        // Subtle rim lighting (Fresnel)
        vec3 viewDir = normalize(-vPosition);
        float fresnel = 1.0 - max(dot(viewDir, normal), 0.0);
        fresnel = pow(fresnel, 3.0);
        color += vec3(0.25, 0.45, 0.8) * fresnel * 0.35;

        // Ambient fill on dark side
        color += vec3(0.02, 0.03, 0.06) * (1.0 - dayFactor);

        gl_FragColor = vec4(color, 1.0);
      }
    `,
  });

  earth = new THREE.Mesh(earthGeo, earthMat);
  scene.add(earth);

  // Atmosphere glow (outer shell)
  const atmosGeo = new THREE.SphereGeometry(1.06, 64, 64);
  const atmosMat = new THREE.ShaderMaterial({
    uniforms: {
      sunDirection: { value: new THREE.Vector3(-0.42, 0.32, 0.85).normalize() },
    },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 sunDirection;
      varying vec3 vNormal;
      varying vec3 vPosition;

      void main() {
        vec3 normal = normalize(vNormal);
        vec3 viewDir = normalize(-vPosition);

        // Fresnel-based atmospheric rim
        float fresnel = 1.0 - max(dot(viewDir, normal), 0.0);
        fresnel = pow(fresnel, 2.5);

        // Sun-side glow stronger
        float sunFacing = max(0.0, dot(normal, sunDirection));
        float intensity = fresnel * (0.5 + 0.5 * sunFacing);

        vec3 atmosColor = mix(
          vec3(0.15, 0.3, 0.7),
          vec3(0.4, 0.7, 1.0),
          sunFacing
        );

        gl_FragColor = vec4(atmosColor, intensity * 0.65);
      }
    `,
    transparent: true,
    side: THREE.BackSide,
    depthWrite: false,
  });

  atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
  scene.add(atmosphere);
}

// Stats
let frameCount = 0;
let fpsAccum = 0;
let lastFpsUpdate = performance.now();

function loop(now) {
  const t0 = performance.now();

  if (earth) {
    earth.rotation.y += 0.002;
  }

  renderer.render(scene, camera);

  const frameTime = performance.now() - t0;
  frameCount++;
  fpsAccum += frameTime;

  if (now - lastFpsUpdate > 1000) {
    const fps = (frameCount / ((now - lastFpsUpdate) / 1000)).toFixed(1);
    const avgMs = (fpsAccum / frameCount).toFixed(1);
    const mem = performance.memory
      ? `JS Heap: ${(performance.memory.usedJSHeapSize / 1048576).toFixed(1)} MB / ${(performance.memory.totalJSHeapSize / 1048576).toFixed(1)} MB`
      : 'JS Heap: use Chrome DevTools → Memory';

    const info = renderer.info;
    const glMem = `Textures: ${info.memory.textures} | Geometries: ${info.memory.geometries}`;
    const glCalls = `Draw calls: ${info.render.calls} | Triangles: ${info.render.triangles}`;

    document.getElementById('stats').textContent =
      `FPS: ${fps}  |  Frame: ${avgMs} ms\n${mem}\n${glMem}\n${glCalls}\nDay: 2048x1024  |  Night: 3600x1800`;
    frameCount = 0;
    fpsAccum = 0;
    lastFpsUpdate = now;
  }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
